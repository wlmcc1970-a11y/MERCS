<script>
/* Apply saved low-light theme before first paint (no flash). */
(function(){try{
  var t=localStorage.getItem('mercs.theme');
  if(t==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    var m=document.querySelector('meta[name=theme-color]');
    if(m)m.setAttribute('content','#15160f');
  }
}catch(e){}})();
</script>

<style>

:root{
  --bg:#e9e5db; --surface:#ffffff; --surface2:#f6f3ea; --surface3:#efe9dc;
  --line:#d8d0bf; --line2:#c7bda6;
  --ink:#1c1d1a; --ink2:#3c3d36; --muted:#6c6d62; --faint:#9a9b8e;
  --olive:#8a8a3c; --olive-d:#5d5c27; --olive-l:#b6b46a; --olive-bg:#7c7b33;
  --orange:#e8881c; --orange-d:#bd6a0c;
  --brass:#b07f34; --slate:#5d6b64;
  --good:#2f7d32; --bad:#c0392b; --mid:#b8860b;
  --font-hero:'Days One',Impact,'Arial Black',sans-serif;
  --font-disp:'Oswald','Arial Narrow',system-ui,sans-serif;
  --font-body:'Barlow',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  --r:12px; --shadow:0 8px 26px rgba(40,38,22,.16); --shadow-s:0 3px 10px rgba(40,38,22,.12);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
/* ===== Low-light (dark) theme — light remains default ===== */
html[data-theme="dark"]{
  --bg:#15160f; --surface:#1f211a; --surface2:#262820; --surface3:#2e3127;
  --line:#3a3d31; --line2:#4a4d3e;
  --ink:#ece9dd; --ink2:#cfccbf; --muted:#9a9b8e; --faint:#7f8073;
  /* keep brand accents, lighten where they must read on dark */
  --olive:#a9a85a; --olive-d:#c4c27a; --olive-l:#cfcd86; --olive-bg:#5d5c27;
  --orange:#f29a32; --orange-d:#e8881c;
  --good:#5bbf5f; --bad:#e8675a; --mid:#d8a93a;
  --shadow:0 8px 26px rgba(0,0,0,.5); --shadow-s:0 3px 10px rgba(0,0,0,.4);
}
/* surfaces that hard-coded near-black text on olive chips stay readable (olive-d is now light on dark) */
html[data-theme="dark"] .unitcard .fac,
html[data-theme="dark"] .wtable th,
html[data-theme="dark"] .handcard .cop,
html[data-theme="dark"] .obj .op{color:#15160f}
/* sticky tally gradient uses the dark bg */
html[data-theme="dark"] .tally{background:linear-gradient(0deg,var(--bg),rgba(21,22,15,.85))}
/* manual open header gradient on dark */
html[data-theme="dark"] .manual[open]>summary{background:linear-gradient(180deg,#2b2d22,#23261d)}
/* rule callout text was a hard olive — use token on dark */
html[data-theme="dark"] .rule{color:var(--ink2)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.5;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100%}
.wrap{max-width:780px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{font-family:var(--font-disp);letter-spacing:.02em}
/* ---- top bar (olive military band) ---- */
header.bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:.7rem;
  padding:calc(.5rem + var(--safe-t)) .9rem .5rem;background:linear-gradient(180deg,var(--olive),var(--olive-d));
  border-bottom:3px solid var(--orange);box-shadow:var(--shadow-s)}
.bar .logo{height:30px;display:block}
.bar .loghome{cursor:pointer;padding:7px 4px;height:44px;box-sizing:content-box;margin:-7px 0;border-radius:8px}
.bar .loghome:active{background:rgba(0,0,0,.18)}
.bar .loghome:focus-visible{outline:2px solid var(--orange);outline-offset:1px}
.bar .ttl{font-family:var(--font-disp);font-weight:600;letter-spacing:.22em;color:#f3efe2;font-size:.72rem;
  text-transform:uppercase;opacity:.9}
.bar .sp{margin-left:auto}
.backbtn{display:none;align-items:center;gap:.3rem;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.14);
  color:#fff;border-radius:9px;padding:.4rem .7rem;font-weight:700;font-size:.8rem;min-height:38px;font-family:var(--font-disp);letter-spacing:.06em}
.backbtn:active{background:rgba(0,0,0,.28)}
.acctbtn{border:1px solid rgba(255,255,255,.4);background:rgba(0,0,0,.16);color:#fbf7ea;border-radius:9px;
  padding:.4rem .65rem;font-family:var(--font-disp);font-weight:600;letter-spacing:.06em;font-size:.7rem;
  text-transform:uppercase;min-height:38px;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
.acctbtn:active{background:rgba(0,0,0,.3)}
.acctbtn.in{background:var(--orange);color:#1c1d1a;border-color:var(--orange-d)}
/* ---- home / splash ---- */
.splash{background:radial-gradient(130% 100% at 50% -15%,#e8a02a 0%,#c8761a 42%,#9a531a 72%,#6f3c16 100%);
  border-bottom:3px solid var(--ink);padding:1.7rem 1.1rem 1.6rem;text-align:center;position:relative;overflow:hidden}
.splash::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.10) 1.4px,transparent 1.5px);
  background-size:15px 15px;opacity:.6;pointer-events:none}
.splash .logo{width:min(78%,360px);filter:drop-shadow(0 4px 12px rgba(60,30,4,.55));position:relative}
.splash .cause{font-family:var(--font-disp);font-weight:700;letter-spacing:.14em;color:#fff3df;text-transform:uppercase;
  font-size:.86rem;margin:.7rem 0 0;position:relative;text-shadow:0 1px 2px rgba(70,35,6,.5)}
.splash .cause b{color:#fff}
.splash .kick{font-family:var(--font-hero);color:#fff;font-size:1.9rem;margin:.45rem 0 0;letter-spacing:.01em;position:relative;
  text-transform:uppercase;-webkit-text-stroke:2px #5a3110;paint-order:stroke fill;
  text-shadow:0 3px 0 #5a3110,0 5px 8px rgba(50,24,4,.45)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;padding:1.1rem 1.1rem calc(1.4rem + var(--safe-b))}
@media(max-width:440px){.tiles{grid-template-columns:1fr}}
.tile{position:relative;text-align:left;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);
  padding:.95rem .95rem .9rem 1.1rem;min-height:120px;display:flex;flex-direction:column;gap:.25rem;
  box-shadow:var(--shadow-s);transition:transform .14s,box-shadow .14s,border-color .14s;overflow:hidden}
.tile:active{transform:translateY(1px) scale(.995)}
.tile:hover{box-shadow:var(--shadow);border-color:var(--olive-l)}
.tile .edge{position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(var(--olive),var(--olive-d))}
.tile .ico{width:30px;height:30px;color:var(--orange)}
.tile h3{margin:.2rem 0 0;font-size:1.05rem;color:var(--ink);font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.tile p{margin:0;color:var(--muted);font-size:.82rem;line-height:1.36}
.tile .go{margin-top:auto;font-family:var(--font-disp);font-weight:700;font-size:.72rem;letter-spacing:.1em;
  color:var(--orange-d);text-transform:uppercase}
/* ---- views ---- */
.view{display:none;padding:0 1.1rem calc(2.2rem + var(--safe-b));animation:fade .22s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.vh{font-size:1.3rem;margin:1.1rem 0 .15rem;color:var(--ink);text-transform:uppercase;font-weight:700}
.vsub{color:var(--muted);font-size:.88rem;margin:0 0 .8rem}
/* ---- field manual (tutorial) — eye-catching but tasteful ---- */
.manual{border:1px solid var(--olive-l);border-left:4px solid var(--orange);border-radius:11px;background:var(--surface2);margin:.2rem 0 1rem;overflow:hidden;box-shadow:var(--shadow-s)}
.manual>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:.5rem;padding:.62rem .85rem;
  font-family:var(--font-disp);font-weight:700;letter-spacing:.08em;color:var(--orange-d);text-transform:uppercase;font-size:.84rem;
  background:linear-gradient(180deg,#fbf2e2,#f4ead2)}
.manual>summary::-webkit-details-marker{display:none}
.manual>summary .mico{width:18px;height:18px;flex:none;color:var(--orange)}
.manual>summary .mico svg{width:18px;height:18px;display:block}
.manual>summary .tw{margin-left:auto;transition:transform .2s;color:var(--orange)}
.manual[open]>summary .tw{transform:rotate(90deg)}
.manual[open]{border-left-color:var(--olive)}
.manual[open]>summary{color:var(--olive-d);background:linear-gradient(180deg,#f0ecdf,#e7e1cf)}
.manual[open]>summary .mico,.manual[open]>summary .tw{color:var(--olive)}
.manual .mbody{padding:.5rem .9rem .8rem}
/* one-time attention cue on the first manual seen per session */
.manual.cue{animation:manualcue 2.4s ease-out 1}
@keyframes manualcue{0%,100%{box-shadow:var(--shadow-s)}18%{box-shadow:0 0 0 3px rgba(232,136,28,.42),0 6px 18px rgba(40,38,22,.18)}55%{box-shadow:0 0 0 2px rgba(232,136,28,.22),var(--shadow-s)}}
@media(prefers-reduced-motion:reduce){.manual.cue{animation:none}}
.manual ol{margin:.2rem 0;padding-left:1.1rem}
.manual ol li{margin:.32rem 0;font-size:.88rem;color:var(--ink2)}
.manual ol li b{color:var(--olive-d)}
.manual .tip{margin-top:.5rem;font-size:.8rem;color:var(--muted);border-top:1px dashed var(--line2);padding-top:.45rem}
/* ---- rule banner ---- */
.rule{display:flex;gap:.5rem;align-items:flex-start;background:#eef1e8;border:1px solid #cdd6bd;
  border-left:3px solid var(--olive);border-radius:9px;padding:.55rem .7rem;color:#3f4a33;font-size:.82rem;margin:.2rem 0 1rem}
.rule b{color:var(--olive-d)}
/* ---- controls ---- */
.row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
select,input[type=number],input[type=search]{background:var(--surface);color:var(--ink);border:1px solid var(--line2);
  border-radius:10px;padding:.55rem .65rem;font-size:.92rem;min-height:44px;font-family:var(--font-body)}
select{min-width:140px}
.btn{border:1px solid #2e2d16;background:linear-gradient(#43421f,#2c2b14);color:#fbf7ea;
  font-weight:700;border-radius:10px;padding:.6rem .9rem;min-height:44px;font-family:var(--font-disp);letter-spacing:.05em;text-transform:uppercase;font-size:.86rem}
.btn .acc,.btn:focus-visible{outline:2px solid var(--orange)}
.btn:active{filter:brightness(.95)}
.btn.ghost{background:var(--surface);color:var(--olive-d);border-color:var(--line2);font-weight:700}
.btn.sm{padding:.42rem .62rem;min-height:38px;font-size:.76rem}
.chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--surface3);border:1px solid var(--line2);
  border-radius:999px;padding:.22rem .6rem;font-size:.74rem;color:var(--ink2);font-family:var(--font-disp);letter-spacing:.04em}
.chip b{color:var(--olive-d)}
.chip.q{background:#efe7d2;border-color:#d8c489;color:#7a5a12}
.chip.dep{background:#e7ded0;border-color:#cdbd9e;color:#7a5a2a}
.muted{color:var(--muted)}.small{font-size:.8rem}
.divider{height:1px;background:var(--line);margin:1rem 0}
/* ---- list / cards ---- */
.list{display:flex;flex-direction:column;gap:.45rem;margin-top:.6rem}
.item{display:flex;align-items:center;gap:.6rem;background:var(--surface);border:1px solid var(--line);
  border-radius:11px;padding:.55rem .7rem;min-height:50px;box-shadow:var(--shadow-s)}
.item .nm{font-weight:700;font-family:var(--font-disp);letter-spacing:.02em}
.item .meta{color:var(--muted);font-size:.78rem}
.item .grow{flex:1}
.item .ar{color:var(--orange-d);font-weight:700}
.unitcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1rem;box-shadow:var(--shadow);margin-top:.6rem}
.unitcard .uhead{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;border-bottom:2px solid var(--olive);padding-bottom:.4rem}
.unitcard h3{margin:0;font-size:1.35rem;color:var(--ink);text-transform:uppercase;font-weight:700}
.unitcard .fac{color:#fff;background:var(--olive-d);font-weight:700;letter-spacing:.1em;font-size:.66rem;
  text-transform:uppercase;padding:.12rem .45rem;border-radius:5px;font-family:var(--font-disp)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:.9rem 0}
.stat{border:1px solid var(--line2);border-radius:10px;padding:.45rem .35rem;text-align:center;background:var(--surface2);cursor:pointer;transition:transform .1s}
.stat:active{transform:scale(.97)}
.stat .k{font-size:.64rem;letter-spacing:.08em;color:var(--muted);font-weight:700;font-family:var(--font-disp)}
.stat .v{font-size:1.55rem;font-weight:700;line-height:1.05;margin-top:.05rem;font-family:var(--font-hero)}
.stat .bar{height:4px;border-radius:3px;margin-top:.32rem;background:#e2dcc d;background:#e3ddcd;overflow:hidden}
.stat .bar i{display:block;height:100%}
.wtable{width:100%;border-collapse:collapse;margin:.5rem 0 .2rem;font-size:.86rem}
.wtable th{color:#fff;background:var(--olive-d);font-weight:600;text-align:center;font-size:.66rem;letter-spacing:.05em;padding:.28rem .2rem;font-family:var(--font-disp)}
.wtable th:first-child{text-align:left;padding-left:.5rem;border-radius:5px 0 0 0}
.wtable th:last-child{border-radius:0 5px 0 0}
.wtable td{border-bottom:1px solid var(--line);padding:.4rem .3rem;text-align:center}
.wtable td.wn{text-align:left;font-weight:700;font-family:var(--font-disp)}
.kw{display:inline-block;background:var(--surface3);border:1px solid var(--line2);border-radius:5px;padding:.02rem .35rem;font-size:.7rem;color:var(--orange-d);margin:0 .15rem .15rem 0;font-weight:600}
.ablist{margin:.5rem 0 0;padding:0;list-style:none}
.ablist li{padding:.45rem 0;border-bottom:1px solid var(--line);font-size:.88rem;color:var(--ink2)}
.ablist b{color:var(--olive-d);font-family:var(--font-disp);letter-spacing:.02em}
/* tracker */
.trkitem{display:flex;align-items:center;gap:.6rem;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:.5rem .65rem;box-shadow:var(--shadow-s)}
.trkitem.done{opacity:.5}
.trkitem.active{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,136,28,.25)}
.initbadge{min-width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;
  background:var(--surface3);border:1px solid var(--line2);font-weight:700;font-size:1.2rem;font-family:var(--font-hero);color:var(--ink)}
.initbadge.lead{background:linear-gradient(var(--orange),var(--orange-d));color:#1c1d1a;border-color:var(--orange-d);text-shadow:0 1px 0 rgba(255,255,255,.25)}
/* objectives */
.obj{display:flex;align-items:center;gap:.6rem;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:.55rem .7rem;cursor:pointer}
.obj.checked{border-color:var(--good);background:#eaf3ea}
.obj .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--faint);flex:none;display:flex;align-items:center;justify-content:center;font-weight:800}
.obj.checked .box{border-color:var(--good);background:var(--good);color:#fff}
.obj .op{margin-left:auto;font-weight:700;color:var(--orange-d);font-family:var(--font-disp)}
.tally{position:sticky;bottom:0;background:linear-gradient(0deg,var(--bg),rgba(233,229,219,.85));padding:.7rem 0 calc(.5rem + var(--safe-b));
  margin-top:.8rem;border-top:2px solid var(--olive);display:flex;align-items:center;gap:.6rem;font-weight:700;font-family:var(--font-disp);letter-spacing:.04em;text-transform:uppercase;font-size:.82rem;color:var(--ink2)}
.tally .big{margin-left:auto;font-size:1.5rem;color:var(--orange-d);font-family:var(--font-hero)}
/* contingency */
.handcard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:.7rem .8rem;box-shadow:var(--shadow-s)}
.handcard.live{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,136,28,.25)}
.handcard .ct{font-weight:700;font-family:var(--font-disp);letter-spacing:.02em;font-size:1rem;text-transform:uppercase}
.handcard .cop{color:#fff;background:var(--olive-d);font-weight:700;font-size:.74rem;border-radius:5px;padding:.05rem .4rem;font-family:var(--font-disp)}
.handcard .cx{font-size:.85rem;color:var(--ink2);margin-top:.35rem}
.handcard .row2{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}
.tagline{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:.78rem;margin:.2rem 0 .6rem}
/* damage */
.dmg{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:.7rem .8rem;margin-bottom:.55rem;box-shadow:var(--shadow-s)}
.dmg.dead{border-color:var(--bad);background:#fbeceb}
.bloodrow{display:flex;align-items:center;gap:.5rem;margin:.5rem 0}
.pips{display:flex;gap:.25rem;flex-wrap:wrap}
.pip{width:20px;height:20px;border-radius:50%;border:2px solid var(--bad);background:transparent}
.pip.full{background:var(--bad)}
.statusrow{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.4rem}
.stog{border:1px solid var(--line2);background:var(--surface2);color:var(--muted);border-radius:999px;padding:.22rem .55rem;font-size:.74rem;min-height:34px;font-family:var(--font-disp);letter-spacing:.03em}
.stog.on{background:var(--orange);color:#1c1d1a;border-color:var(--orange-d);font-weight:700}
/* popover + toast */
.pop{position:fixed;inset:0;background:rgba(28,29,22,.5);display:none;align-items:flex-end;justify-content:center;z-index:50}
.pop.open{display:flex}
.popcard{background:var(--surface);border:1px solid var(--line2);border-top:4px solid var(--olive);border-radius:16px 16px 0 0;width:100%;max-width:780px;
  padding:1rem 1.1rem calc(1.2rem + var(--safe-b));box-shadow:var(--shadow);animation:up .2s ease}
@keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.popcard h4{margin:.1rem 0 .2rem;font-size:1.15rem;color:var(--ink);text-transform:uppercase}
.popcard .bw{display:inline-block;margin-top:.5rem;font-size:.78rem;padding:.2rem .55rem;border-radius:6px;font-weight:700;font-family:var(--font-disp);
  background:#eaf3ea;color:var(--good);border:1px solid var(--good)}
/* ---- translate language picker ---- */
.langlist{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;max-height:46vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;padding:.15rem;margin:.2rem -.15rem}
@media(max-width:440px){.langlist{grid-template-columns:1fr 1fr}}
.langopt{text-align:left;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;

.sres{display:flex;flex-direction:column;align-items:flex-start;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);
  border-radius:9px;padding:.5rem .7rem;margin-bottom:.35rem;min-height:46px;box-shadow:var(--shadow-s)}
.sres .sl{font-weight:700;font-family:var(--font-disp);color:var(--ink)}
.sres .ss{font-size:.76rem;color:var(--muted)}
mark{background:#ffe39a;color:#5a3a00;border-radius:3px;padding:0 .1em}
/* strike team validation */
.bad{color:var(--bad);font-weight:700}.good{color:var(--good);font-weight:700}
/* spinner */
.spinner{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(233,229,219,.4)}
.spinner.show{display:flex}
.spinner i{width:38px;height:38px;border:4px solid var(--line2);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* update bar */
.updatebar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--tabbar-h) + .6rem + var(--safe-b));z-index:65;
  background:var(--orange);color:#1c1d1a;font-family:var(--font-disp);font-weight:700;letter-spacing:.03em;border-radius:10px;padding:.6rem 1rem;
  box-shadow:var(--shadow);display:none;cursor:pointer;font-size:.82rem;border:1px solid var(--orange-d)}
.updatebar.show{display:block}
footer.src{padding-bottom:calc(1.4rem + var(--tabbar-h) + var(--safe-b))}


/* search deep-link highlight pulse (restored) */
.rec-hl{animation:recpulse 2s ease-out 1}
@keyframes recpulse{0%{box-shadow:0 0 0 0 rgba(232,136,28,.0);outline:2px solid rgba(232,136,28,0)}12%{box-shadow:0 0 0 4px rgba(232,136,28,.45);outline:2px solid var(--orange)}100%{box-shadow:0 0 0 0 rgba(232,136,28,0);outline:2px solid rgba(232,136,28,0)}}

.ucls{margin-left:.4rem;background:transparent;border:1px solid var(--line2);color:var(--muted);border-radius:8px;min-width:36px;min-height:36px;font-size:1rem;line-height:1;cursor:pointer}
.ucls:hover{border-color:var(--orange);color:var(--orange-d)}

.rsub{font-family:var(--font-disp);font-size:1rem;letter-spacing:.04em;color:var(--olive-d);text-transform:uppercase;margin:1.15rem 0 .35rem;padding-bottom:.2rem;border-bottom:1px solid var(--line2)}
.rulebook .rsub{font-size:1.02rem}
</style>
</head>
<body>
<div class="launch" id="launchSplash" aria-hidden="true">
  <img class="llogo" src="assets/logo_white.png" alt="MERCS">
</div>
<div class="wrap">
  <header class="bar">
    <img class="logo loghome" id="barLogo" src="assets/logo_white.png" alt="MERCS — Home" role="button" tabindex="0" aria-label="Home">
    <span class="ttl">Companion</span>
    <div class="barbtns">
      <button class="iconbtn installbtn" id="installBtn" title="Install app" aria-label="Install app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11"/><path d="M8 11l4 4 4-4"/><path d="M4 19h16"/></svg></button>
      <button class="iconbtn" id="searchBtn" title="Search" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
      <button class="iconbtn" id="xlateBtn" title="Translate" aria-label="Translate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15.5 0 18M12 3c-2.5 2.5-2.5 15.5 0 18"/></svg></button>
      <button class="iconbtn themebtn" id="themeBtn" title="Low-light mode" aria-label="Toggle low-light mode"><svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg><svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg></button>
      <button class="iconbtn" id="toolsBtn" title="Field Tools" aria-label="Field Tools"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 1 5.4-5.4l-2.3 2.3-1.4-1.4z"/></svg></button>
      <button class="acctbtn" id="acctBtn">Sign In</button>
    </div>
  </header>

  <main id="panels">
    <section class="panel" id="panel-home"></section>
    <section class="panel" id="panel-megacons"></section>
    <section class="panel" id="panel-contingency"></section>
    <section class="panel" id="panel-corp"></section>
    <section class="panel" id="panel-operations"></section>
    <section class="panel" id="panel-rules"></section>
    <section class="panel" id="panel-modifiers"></section>
    <section class="panel" id="panel-keywords"></section>
  </main>
</div>

<nav id="tabbar"></nav>

<!-- Tools overlay -->
<div class="tools" id="tools"><div class="toolsheet">
  <div class="toolsbar">
    <button class="backbtn" id="toolsBack" style="display:none">‹ Tools</button>
    <h2 id="toolsTitle">Field Tools</h2><span class="sp"></span>
    <button class="iconbtn" id="toolsClose" aria-label="Close">✕</button>
  </div>
  <div class="toolscont" id="toolsBody"></div>
</div></div>

<!-- Search overlay -->
<div class="search" id="search"><div class="searchsheet">
  <div class="searchhead">
    <input id="searchInput" type="search" placeholder="Search units, cards, rules…" autocomplete="off">
    <button class="iconbtn" id="searchClose" aria-label="Close">✕</button>
  </div>
  <div class="searchcont" id="searchResults"></div>
</div></div>

<div class="pop" id="pop"><div class="popcard" id="popcard"></div></div>
<div class="toast" id="toast"></div>
<div class="offbar" id="offbar" role="status" aria-live="polite"><span class="spin"></span><span class="offmsg">Saving cards for offline…</span></div>
<div class="spinner" id="spinner"><i></i></div>
<div class="updatebar" id="updateBar">New version available — tap to update</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
